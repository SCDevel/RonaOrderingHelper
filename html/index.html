<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script type="module" src="../scripts/index.js"></script>
    <link rel="stylesheet" href="../css/index.css">
</head>

<body>

<div class="container">

    <h1>Extension Settings</h1>

    <div class="card">
        <label for="fileInput">Rona Order Info Display</label>
        <input type="file" id="fileInput" accept=".csv">
    </div>

    <div class="card">
        <form id="rona-password">
            <label for="ronaPasswordInput">Change Rona Password</label>
            <div class="input-row">
                <input type="password" id="ronaPasswordInput">
                <button id="submitButton" type="submit">Save</button>
            </div>
        </form>
    </div>

    <div class="card">
        <form id="export-form">
            <button type="submit" class="export-btn">Export UPC Log</button>
        </form>
    </div>

</div>

</body>
</html>
